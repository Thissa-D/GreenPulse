<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPulse - Sitemap</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .sitemap-container {
            max-width: 1200px;
            margin: 20px auto;
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        .sitemap-container h2,
        .sitemap-container p {
            text-align: center;
            margin-bottom: 15px;
        }

        .sitemap-svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .node rect {
            fill: #dce8cf;
            stroke: #4a7c59;
            stroke-width: 2;
            rx: 10;
            ry: 10;
            transition: 0.3s;
        }

        .node text {
            fill: #2f4f2f;
            font-size: 14px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            pointer-events: none;
        }

        .node:hover rect {
            fill: #c8d8b9;
            stroke: #365a42;
            stroke-width: 3;
        }

        .node:focus rect,
        .node a:focus rect {
            fill: #c8d8b9;
            stroke: #1f3d27;
            stroke-width: 4;
            outline: none;
        }

        .line {
            stroke: #4a7c59;
            stroke-width: 2;
        }

        .active-nav {
            text-decoration: underline;
            color: #365a42;
        }
    </style>
</head>
